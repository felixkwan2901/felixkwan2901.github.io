<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="NZX AlphaLab quantitative research platform" font-family="'Sora','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070b14"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <radialGradient id="gl" cx="0.82" cy="0.18" r="0.75"><stop offset="0" stop-color="#7c5cff" stop-opacity="0.20"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></radialGradient>
    <linearGradient id="fan" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.30"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#gl)"/>
  <g stroke="#ffffff" stroke-opacity="0.04"><path d="M0 100H800M0 200H800M0 300H800M0 400H800"/><path d="M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500"/></g>
  <!-- logo -->
  <g transform="translate(60,52)"><rect width="64" height="64" rx="16" fill="url(#acc)"/><text x="32" y="34" dominant-baseline="central" text-anchor="middle" font-size="24" font-weight="800" fill="#0a0f1e">α</text></g>
  <text x="138" y="78" font-size="33" font-weight="800" fill="#eef2f8">NZX <tspan fill="#a78bfa">AlphaLab</tspan></text>
  <text x="140" y="106" font-size="13.5" letter-spacing="2" font-weight="600" fill="#9fb0c9">ML STOCK-RETURN PREDICTION · QUANT RESEARCH</text>

  <!-- Monte Carlo fan chart -->
  <g transform="translate(60,150)">
    <text x="0" y="-6" font-size="12" font-weight="700" fill="#a78bfa" font-family="Inter,Arial">MONTE CARLO · 10,000 PATHS</text>
    <rect x="0" y="6" width="430" height="170" rx="12" fill="#101a2e" stroke="#ffffff" stroke-opacity="0.07"/>
    <!-- fan band -->
    <path d="M16 150 C 120 140, 240 120, 414 60 L 414 130 C 240 150, 120 160, 16 158 Z" fill="url(#fan)"/>
    <!-- median path -->
    <path d="M16 154 C 130 138, 250 118, 414 90" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <!-- sample paths -->
    <path d="M16 154 C 120 150, 250 110, 414 64" fill="none" stroke="#7c5cff" stroke-width="1" stroke-opacity="0.55"/>
    <path d="M16 154 C 140 146, 250 140, 414 120" fill="none" stroke="#7c5cff" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M16 154 C 120 152, 260 100, 414 78" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- KPI / metric tiles -->
  <g font-family="Inter,Arial">
    <g transform="translate(520,150)"><rect width="220" height="54" rx="12" fill="#101a2e" stroke="#ffffff" stroke-opacity="0.07"/><text x="16" y="26" font-size="11" fill="#647795">Directional accuracy</text><text x="16" y="44" font-size="18" font-weight="800" fill="#2af5b3" font-family="Sora">58.4%</text></g>
    <g transform="translate(520,214)"><rect width="220" height="54" rx="12" fill="#101a2e" stroke="#ffffff" stroke-opacity="0.07"/><text x="16" y="26" font-size="11" fill="#647795">Sharpe ratio (test)</text><text x="16" y="44" font-size="18" font-weight="800" fill="#eef2f8" font-family="Sora">1.34</text></g>
    <g transform="translate(520,278)"><rect width="220" height="54" rx="12" fill="#101a2e" stroke="#ffffff" stroke-opacity="0.07"/><text x="16" y="26" font-size="11" fill="#647795">Max drawdown</text><text x="16" y="44" font-size="18" font-weight="800" fill="#ffb020" font-family="Sora">-12.7%</text></g>
  </g>

  <!-- SHAP feature importance bars -->
  <g transform="translate(60,340)" font-family="Inter,Arial">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#22d3ee">SHAP FEATURE IMPORTANCE</text>
    <g transform="translate(0,14)">
      <rect width="300" height="14" rx="4" fill="#7c5cff"/><text x="312" y="11" font-size="11" fill="#9fb0c9">RSI 14</text></g>
    <g transform="translate(0,36)">
      <rect width="232" height="14" rx="4" fill="#22d3ee"/><text x="244" y="11" font-size="11" fill="#9fb0c9">MACD hist</text></g>
    <g transform="translate(0,58)">
      <rect width="180" height="14" rx="4" fill="#7c5cff" fill-opacity="0.8"/><text x="192" y="11" font-size="11" fill="#9fb0c9">20d volatility</text></g>
    <g transform="translate(0,80)">
      <rect width="120" height="14" rx="4" fill="#22d3ee" fill-opacity="0.7"/><text x="132" y="11" font-size="11" fill="#9fb0c9">Rel. strength vs NZX50</text></g>
  </g>

  <!-- model chips -->
  <g font-family="Inter,Arial" font-size="11" font-weight="600">
    <g transform="translate(520,360)"><rect width="68" height="24" rx="12" fill="#16223a" stroke="#7c5cff" stroke-opacity="0.4"/><text x="34" y="16" text-anchor="middle" fill="#cdd6e6">XGBoost</text></g>
    <g transform="translate(596,360)"><rect width="64" height="24" rx="12" fill="#16223a" stroke="#22d3ee" stroke-opacity="0.4"/><text x="32" y="16" text-anchor="middle" fill="#cdd6e6">LightGBM</text></g>
    <g transform="translate(668,360)"><rect width="52" height="24" rx="12" fill="#16223a" stroke="#7c5cff" stroke-opacity="0.4"/><text x="26" y="16" text-anchor="middle" fill="#cdd6e6">LSTM</text></g>
    <g transform="translate(520,392)"><rect width="86" height="24" rx="12" fill="#16223a" stroke="#22d3ee" stroke-opacity="0.4"/><text x="43" y="16" text-anchor="middle" fill="#cdd6e6">Walk-forward</text></g>
    <g transform="translate(614,392)"><rect width="48" height="24" rx="12" fill="#16223a" stroke="#7c5cff" stroke-opacity="0.4"/><text x="24" y="16" text-anchor="middle" fill="#cdd6e6">SHAP</text></g>
  </g>

  <text x="740" y="476" text-anchor="end" font-size="13" font-weight="600" fill="#647795">Concept · Quantitative ML · Backtested &amp; stress-tested</text>
</svg>
