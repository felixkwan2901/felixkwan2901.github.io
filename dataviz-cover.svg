<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Tableau data visualisation dashboards" font-family="'Sora','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080d1c"/><stop offset="1" stop-color="#0d1530"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <radialGradient id="gl" cx="0.82" cy="0.18" r="0.75"><stop offset="0" stop-color="#06b6d4" stop-opacity="0.16"/><stop offset="1" stop-color="#06b6d4" stop-opacity="0"/></radialGradient>
    <linearGradient id="a1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f97316" stop-opacity="0.30"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/></linearGradient>
    <linearGradient id="a2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a78bfa" stop-opacity="0.32"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#gl)"/>
  <g stroke="#ffffff" stroke-opacity="0.04"><path d="M0 100H800M0 200H800M0 300H800M0 400H800"/><path d="M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500"/></g>
  <!-- logo -->
  <g transform="translate(60,50)"><rect width="64" height="64" rx="16" fill="url(#acc)"/>
    <g fill="#08111f"><rect x="20" y="30" width="6" height="16" rx="1.5"/><rect x="29" y="22" width="6" height="24" rx="1.5"/><rect x="38" y="26" width="6" height="20" rx="1.5"/></g></g>
  <text x="138" y="72" font-size="30" font-weight="800" fill="#eef2f8">Data <tspan fill="#06b6d4">Visualisation</tspan></text>
  <text x="140" y="100" font-size="13" letter-spacing="2" font-weight="600" fill="#9fb0c9">TABLEAU · INTERACTIVE DASHBOARDS &amp; DATA STORYTELLING</text>

  <!-- two mini dashboards side by side -->
  <!-- card 1: road safety (declining) -->
  <g transform="translate(60,150)">
    <rect width="330" height="200" rx="13" fill="#101a2e" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="18" y="30" font-size="13" font-weight="700" fill="#f97316" font-family="Inter,Arial">NZ Road Safety</text>
    <text x="18" y="48" font-size="11" fill="#647795" font-family="Inter,Arial">Serious injuries per capita · 2000–2024</text>
    <g stroke="#ffffff" stroke-opacity="0.06"><path d="M30 150H310M30 110H310M30 70H310"/></g>
    <path d="M30 78 C 90 70, 140 120, 200 104 C 260 88, 290 140, 310 128 L 310 160 L 30 160 Z" fill="url(#a1)"/>
    <path d="M30 78 C 90 70, 140 120, 200 104 C 260 88, 290 140, 310 128" fill="none" stroke="#f97316" stroke-width="2.4" stroke-linecap="round"/>
  </g>
  <!-- card 2: digital shift (rising) -->
  <g transform="translate(410,150)">
    <rect width="330" height="200" rx="13" fill="#101a2e" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="18" y="30" font-size="13" font-weight="700" fill="#a78bfa" font-family="Inter,Arial">The Unspoken Shift</text>
    <text x="18" y="48" font-size="11" fill="#647795" font-family="Inter,Arial">When connection went digital</text>
    <g stroke="#ffffff" stroke-opacity="0.06"><path d="M30 150H310M30 110H310M30 70H310"/></g>
    <path d="M30 150 C 100 132, 160 100, 230 72 C 270 56, 295 48, 310 44 L 310 160 L 30 160 Z" fill="url(#a2)"/>
    <path d="M30 150 C 100 132, 160 100, 230 72 C 270 56, 295 48, 310 44" fill="none" stroke="#06b6d4" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- chips -->
  <g font-family="Inter,Arial" font-size="11.5" font-weight="600">
    <g transform="translate(60,378)"><rect width="98" height="26" rx="13" fill="#16223a" stroke="#06b6d4" stroke-opacity="0.4"/><text x="49" y="17" text-anchor="middle" fill="#cdd6e6">Tableau</text></g>
    <g transform="translate(166,378)"><rect width="126" height="26" rx="13" fill="#16223a" stroke="#f97316" stroke-opacity="0.4"/><text x="63" y="17" text-anchor="middle" fill="#cdd6e6">Data storytelling</text></g>
    <g transform="translate(300,378)"><rect width="150" height="26" rx="13" fill="#16223a" stroke="#a78bfa" stroke-opacity="0.4"/><text x="75" y="17" text-anchor="middle" fill="#cdd6e6">2 live dashboards</text></g>
  </g>

  <text x="740" y="466" text-anchor="end" font-size="13" font-weight="600" fill="#647795">Published on Tableau Public · embedded live</text>
</svg>
